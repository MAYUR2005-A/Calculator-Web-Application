<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calc.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Calculator</title>
</head>
<body>
   
    <div class="container">
         <div class="card">
             <h1>CALCULATOR</h1>
             <div class="rows">
                <input type="text" class="inp" required>
        <div class="row">
            <button class="button" id="gr">AC</button>
            <button class="button" id="gr" data-value="delete"><i class="fa-solid fa-delete-left"></i></button>
            <button class="button" id="gr">%</button>
            <button class="button" id="or">÷</button>
        </div>
        <div class="row">
            <button class="button">7</button>
            <button class="button">8</button>
            <button class="button">9</button>
            <button class="button" id="or">x</button>
        </div>
        <div class="row">
             <button class="button">4</button>
            <button class="button">5</button>
            <button class="button">6</button>
            <button class="button" id="or">-</button>
        </div>
        <div class="row">
             <button class="button">1</button>
            <button class="button">2</button>
            <button class="button">3</button>
            <button class="button" id="or">+</button>
        </div>
        <div class="row">
             <button class="button">0</button>
            <button class="button">00</button>
            <button class="button">.</button>
            <button class="button" id="or">=</button>
        </div>
           </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
